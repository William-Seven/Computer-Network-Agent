<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计算机网络实践辅导系统</title>
    <!-- 引入 Markdown 解析库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f3f4f6;
            --chat-bg: #ffffff;
            --user-msg-bg: #2563eb;
            --bot-msg-bg: #f1f5f9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 260px;
            background-color: #1e293b;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .exp-list {
            list-style: none;
            padding: 0;
        }

        .exp-list li {
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .exp-list li:hover, .exp-list li.active {
            background-color: #334155;
            opacity: 1;
        }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--chat-bg);
            max-width: 1000px;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: flex;
            align-items: flex-start;
            max-width: 80%;
            gap: 12px;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .message.bot .avatar { background-color: #e2e8f0; }
        .message.user .avatar { background-color: #dbeafe; }

        .bubble {
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            position: relative;
            word-wrap: break-word;
        }

        .message.bot .bubble {
            background-color: var(--bot-msg-bg);
            color: #1e293b;
            border-top-left-radius: 4px;
        }

        .message.user .bubble {
            background-color: var(--user-msg-bg);
            color: white;
            border-top-right-radius: 4px;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            outline: none;
            font-size: 1rem;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
        }

        button {
            padding: 12px 24px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #1d4ed8;
        }
        
        button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }

        /* 完善的 Markdown 样式 */
        .bubble {
            font-size: 0.95rem;
        }
        .bubble p {
            margin: 0 0 10px 0;
        }
        .bubble p:last-child {
            margin-bottom: 0;
        }
        .bubble pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 10px 0;
        }
        .bubble code {
            font-family: Consolas, Monaco, "Courier New", monospace;
            font-size: 0.9em;
            background: rgba(0,0,0,0.1);
            padding: 2px 4px;
            border-radius: 4px;
        }
        .bubble pre code {
            background: transparent;
            padding: 0;
            color: inherit;
        }
        .bubble ul, .bubble ol {
            padding-left: 20px;
            margin: 10px 0;
        }
        .bubble li {
            margin-bottom: 4px;
        }
        .bubble blockquote {
            border-left: 4px solid #cbd5e1;
            margin: 10px 0;
            padding-left: 10px;
            color: #64748b;
        }
        .bubble strong {
            font-weight: 600;
        }
        .bubble a {
            color: var(--primary-color);
            text-decoration: underline;
        }
        /* 用户消息是深色背景，调整代码块样式 */
        .message.user .bubble code {
            background: rgba(255,255,255,0.2);
        }
        .message.user .bubble a {
            color: #e0f2fe;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>🎓 实验导航</h2>
        <ul class="exp-list">
            <li class="active" onclick="selectExp('Lab 1: VLAN 基础配置')">Lab 1: VLAN 基础配置</li>
            <li onclick="selectExp('Lab 2: OSPF 动态路由')">Lab 2: OSPF 动态路由</li>
            <li onclick="selectExp('Lab 3: ACL 访问控制')">Lab 3: ACL 访问控制</li>
            <li onclick="selectExp('Lab 4: NAT 网络地址转换')">Lab 4: NAT 网络地址转换</li>
        </ul>
        <div style="margin-top: auto; font-size: 0.8rem; opacity: 0.6;">
            Session ID: <br><span id="sessionId">init...</span>
        </div>
    </div>

    <div class="main-chat">
        <div class="chat-header">
            <h3 id="currentExp">Lab 1: VLAN 基础配置</h3>
            <button onclick="clearChat()" style="padding: 6px 12px; font-size: 0.9rem; background: #64748b;">清空对话</button>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message bot">
                <div class="avatar">🤖</div>
                <div class="bubble">你好！我是你的计算机网络实验助教。遇到什么问题了吗？</div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="输入你的问题，例如：如何配置 VLAN？" onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()" id="sendBtn">发送</button>
        </div>
    </div>

    <script>
        // 生成一个持久的 Base Session ID（实际项目中应来自用户登录信息）
        // 这里为了演示，如果 localStorage 有就用，没有就生成一个存起来
        let baseSessionId = localStorage.getItem('cn_agent_base_id');
        if (!baseSessionId) {
            baseSessionId = 'sess_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('cn_agent_base_id', baseSessionId);
        }

        // 当前实验 ID 映射
        const labMap = {
            'Lab 1: VLAN 基础配置': 'lab01',
            'Lab 2: OSPF 动态路由': 'lab02',
            'Lab 3: ACL 访问控制': 'lab03',
            'Lab 4: NAT 网络地址转换': 'lab04'
        };

        let currentLabKey = 'lab01';
        let currentSessionId = `${baseSessionId}_${currentLabKey}`;

        // 初始化显示
        updateSessionDisplay();
        // 尝试加载 Lab 1 的历史
        loadHistory();

        function updateSessionDisplay() {
            document.getElementById('sessionId').innerText = currentSessionId;
        }

        async function selectExp(name) {
            // 1. UI 激活状态切换
            document.querySelectorAll('.exp-list li').forEach(li => li.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('currentExp').innerText = name;

            // 2. 切换 Session ID
            currentLabKey = labMap[name] || 'general';
            currentSessionId = `${baseSessionId}_${currentLabKey}`;
            updateSessionDisplay();

            // 3. 清空当前视图并加载新历史
            document.getElementById('chatContainer').innerHTML = '';
            // 显示正在加载提示（可选）
            addMessage('bot', `🔄 正在切换到 ${name}...`);
            
            await loadHistory();
        }

        async function loadHistory() {
            try {
                const response = await fetch(`http://localhost:8111/chat/history?session_id=${currentSessionId}`);
                if (response.ok) {
                    const data = await response.json();
                    const history = data.history || [];
                    
                    // 清空“正在切换”的提示，重新渲染完整历史
                    document.getElementById('chatContainer').innerHTML = '';
                    
                    if (history.length === 0) {
                        // 如果没有历史，显示默认欢迎语
                        addMessage('bot', `你好！我是你的 ${document.getElementById('currentExp').innerText} 实验助教。有什么问题吗？`);
                    } else {
                        // 渲染历史记录
                        history.forEach(msg => {
                            // role: "user" | "assistant" -> 转换一下
                            const role = msg.role === 'user' ? 'user' : 'bot';
                            addMessage(role, msg.content);
                        });
                        // 滚动到底部
                        const container = document.getElementById('chatContainer');
                        container.scrollTop = container.scrollHeight;
                    }
                }
            } catch (e) {
                console.error("加载历史失败", e);
                addMessage('bot', '⚠️ 加载历史记录失败，请检查后端服务。');
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function clearChat() {
            document.getElementById('chatContainer').innerHTML = `
                <div class="message bot">
                    <div class="avatar">🤖</div>
                    <div class="bubble">对话已清空。有什么新问题吗？</div>
                </div>
            `;
        }

        function addMessage(role, text) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            
            // 使用 marked 解析 Markdown
            let formattedText = text;
            try {
                if (typeof marked !== 'undefined') {
                    formattedText = marked.parse(text);
                } else {
                    // 降级处理
                    formattedText = text.replace(/\n/g, '<br>');
                }
            } catch (e) {
                console.error("Markdown parse error:", e);
                formattedText = text.replace(/\n/g, '<br>');
            }
            
            div.innerHTML = `
                <div class="avatar">${role === 'bot' ? '🤖' : '👨‍🎓'}</div>
                <div class="bubble">${formattedText}</div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');
            const text = input.value.trim();
            
            if (!text) return;

            // UI 更新
            addMessage('user', text);
            input.value = '';
            input.disabled = true;
            btn.disabled = true;
            btn.innerText = '思考中...';

            try {
                // 指向后端 8111 端口
                const response = await fetch('http://localhost:8111/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: currentSessionId, // 使用当前动态的 Session ID
                        query: text
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    addMessage('bot', data.reply);
                } else {
                    addMessage('bot', '❌ 服务器错误，请稍后再试。');
                }
            } catch (error) {
                addMessage('bot', `❌ 网络错误: ${error.message}`);
            } finally {
                input.disabled = false;
                btn.disabled = false;
                btn.innerText = '发送';
                input.focus();
            }
        }
    </script>
</body>
</html>
