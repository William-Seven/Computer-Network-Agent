<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计算机网络实践辅导系统</title>
    <!-- 引入 Markdown 解析库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f3f4f6;
            --chat-bg: #ffffff;
            --user-msg-bg: #2563eb;
            --bot-msg-bg: #f1f5f9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 300px;
            background-color: #1e293b;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            /* 添加过渡动画 */
            white-space: nowrap;
            /* 防止内容换行 */
            overflow: hidden;
            /* 隐藏溢出内容 */
        }

        .sidebar.collapsed {
            width: 0;
            padding-left: 0;
            padding-right: 0;
            opacity: 0;
        }

        .sidebar h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .exp-list {
            list-style: none;
            padding: 0;
        }

        .exp-list li {
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .exp-list li:hover,
        .exp-list li.active {
            background-color: #334155;
            opacity: 1;
        }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--chat-bg);
            /* 移除最大宽度限制，使其占满剩余空间 */
            width: auto;
            margin: 0;
            box-shadow: none;
            /* 去除阴影，因为已全屏 */
        }

        .chat-header {
            padding: 8px 20px;
            /* 进一步压缩高度 */
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 40px;
            /* 固定高度，更稳定 */
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-clear-btn {
            background-color: #f59e0b;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 0.82rem;
            line-height: 1;
            cursor: pointer;
            font-weight: 600;
        }

        .chat-clear-btn:hover {
            background-color: #d97706;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .toggle-btn {
            background: none;
            border: none;
            color: #64748b;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .toggle-btn:hover {
            background-color: #f1f5f9;
            color: #1e293b;
        }

        .chat-header h3 {
            margin: 0;
            font-size: 1rem;
            /* 稍微减小字号 */
            font-weight: 600;
        }

        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: flex;
            align-items: flex-start;
            /* 限制气泡最大宽度，保证阅读体验，避免单行文字过长 */
            max-width: 900px;
            gap: 16px;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 40px;
            /* 稍微放大头像 */
            height: 40px;
            border-radius: 8px;
            /* 改为圆角矩形，更现代 */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
            /* 防止被压缩 */
        }

        .message.bot .avatar {
            background-color: #e2e8f0;
        }

        .message.user .avatar {
            background-color: #dbeafe;
        }

        .bubble {
            padding: 14px 18px;
            /* 增加内边距，呼吸感更强 */
            border-radius: 12px;
            line-height: 1.6;
            /* 增加行高，提升阅读体验 */
            position: relative;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            /* 添加微弱阴影 */
        }

        .message.bot .bubble {
            background-color: var(--bot-msg-bg);
            color: #1e293b;
            border-top-left-radius: 4px;
        }

        .message.user .bubble {
            background-color: var(--user-msg-bg);
            color: white;
            border-top-right-radius: 4px;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            outline: none;
            font-size: 1rem;
            background-color: #f8fafc;
            /* 浅灰背景，更有质感 */
            transition: all 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
        }

        button {
            padding: 12px 24px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }

        /* 流式状态消息样式 */
        .status-msg {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 4px;
            font-style: italic;
        }

        /* 完善的 Markdown 样式 */
        .bubble {
            font-size: 1rem;
            /* 增大正文字号 */
        }

        .bubble img {
            max-width: 100%;
            border-radius: 8px;
            margin: 10px 0;
            border: 1px solid #e2e8f0;
        }

        .bubble p {
            margin: 0 0 10px 0;
        }

        .bubble p:last-child {
            margin-bottom: 0;
        }

        .bubble pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 10px 0;
        }

        .bubble code {
            font-family: Consolas, Monaco, "Courier New", monospace;
            font-size: 0.9em;
            background: rgba(0, 0, 0, 0.1);
            padding: 2px 4px;
            border-radius: 4px;
        }

        .bubble pre code {
            background: transparent;
            padding: 0;
            color: inherit;
        }

        .bubble ul,
        .bubble ol {
            padding-left: 20px;
            margin: 10px 0;
        }

        .bubble li {
            margin-bottom: 4px;
        }

        .bubble blockquote {
            border-left: 4px solid #cbd5e1;
            margin: 10px 0;
            padding-left: 10px;
            color: #64748b;
        }

        .bubble strong {
            font-weight: 600;
        }

        .bubble a {
            color: var(--primary-color);
            text-decoration: underline;
        }

        /* 用户消息是深色背景，调整代码块样式 */
        .message.user .bubble code {
            background: rgba(255, 255, 255, 0.2);
        }

        .message.user .bubble a {
            color: #e0f2fe;
        }

        /* 登录/注册层样式 */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 360px;
            text-align: center;
        }

        .auth-card h2 {
            margin-bottom: 24px;
            color: #1e293b;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .auth-form input {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
        }

        .auth-form button {
            width: 100%;
            margin-top: 8px;
        }

        .auth-switch {
            margin-top: 16px;
            font-size: 0.9rem;
            color: #64748b;
        }

        .auth-switch a {
            color: var(--primary-color);
            cursor: pointer;
            text-decoration: underline;
        }

        .hidden {
            display: none !important;
        }

        .logout-btn {
            margin-top: 15px;
            background-color: #ef4444;
            color: white;
            padding: 8px 10px;
            font-size: 0.9rem;
            width: 100%;
            border-radius: 6px;
            box-sizing: border-box;
            white-space: normal;
            line-height: 1.3;
            text-align: center;
        }

        .logout-btn:hover {
            background-color: #dc2626;
        }
    </style>
</head>

<body>
    <!-- 认证层 -->
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-card">
            <h2 id="authTitle">学生登录</h2>

            <!-- 登录表单 -->
            <div id="loginForm" class="auth-form">
                <input type="text" id="loginId" placeholder="请输入10位学号" maxlength="10">
                <input type="password" id="loginPwd" placeholder="请输入密码">
                <button onclick="handleLogin()">登录</button>
                <div class="auth-switch">
                    首次使用？<a onclick="showRegister()">去注册</a>
                </div>
            </div>

            <!-- 注册表单 -->
            <div id="registerForm" class="auth-form hidden">
                <input type="text" id="regId" placeholder="请输入10位学号" maxlength="10">
                <input type="password" id="regPwd1" placeholder="设置密码">
                <input type="password" id="regPwd2" placeholder="确认密码">
                <button onclick="handleRegister()">注册</button>
                <div class="auth-switch">
                    已有账号？<a onclick="showLogin()">去登录</a>
                </div>
            </div>

            <div id="authMsg" style="color: red; margin-top: 10px; font-size: 0.9rem;"></div>
        </div>
    </div>

    <div class="sidebar">
        <h2>🎓 实验导航</h2>
        <ul class="exp-list">
            <li class="active" onclick="selectExp(event, '实验1: 基本交换机配置')">实验1: 基本交换机配置</li>
            <li onclick="selectExp(event, '实验2: 路由器配置')">实验2: 路由器配置</li>
            <li onclick="selectExp(event, '实验3: RIP 和 OSPF 路由协议的配置及协议流程分析')">实验3: RIP 和 OSPF 路由协议的配置及协议流程分析</li>
            <li onclick="selectExp(event, '实验4: 交换机基本配置和 VLAN')">实验4: 交换机基本配置和 VLAN</li>
        </ul>
        <div style="margin-top: auto;">
            <div style="font-size: 0.8rem; opacity: 0.6; margin-bottom: 5px;">
                当前用户: <span id="currentUserDisplay">-</span>
            </div>
            <div style="font-size: 0.7rem; opacity: 0.4;">
                Session: <span id="sessionId">init...</span>
            </div>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
    </div>

    <div class="main-chat">
        <div class="chat-header">
            <div class="header-left">
                <button class="toggle-btn" onclick="toggleSidebar()" title="切换侧边栏">☰</button>
                <h3 id="currentExp">实验1: 基本交换机配置</h3>
            </div>
            <div class="header-actions">
                <button class="chat-clear-btn" onclick="clearCurrentHistory()">清空历史</button>
            </div>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message bot">
                <div class="avatar">🤖</div>
                <div class="bubble">你好！我是你的计算机网络实验助教。遇到什么问题了吗？</div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="输入你的问题，例如：如何配置 VLAN？" onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()" id="sendBtn">发送</button>
        </div>
    </div>

    <script>
        // 侧边栏切换逻辑
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            sidebar.classList.toggle('collapsed');
        }

        // 用户信息与会话管理
        let currentUser = null;
        let currentLabKey = 'lab01';

        // 实验映射
        const labMap = {
            '实验1: 基本交换机配置': 'lab01',
            '实验2: 路由器配置': 'lab02',
            '实验3: RIP 和 OSPF 路由协议的配置及协议流程分析': 'lab03',
            '实验4: 交换机基本配置和 VLAN': 'lab04'
        };

        // 检查本地登录状态
        const storedUser = localStorage.getItem('cn_agent_user_id');
        if (storedUser) {
            // 自动登录
            currentUser = storedUser;
            document.getElementById('authOverlay').classList.add('hidden');
            initSystem();
        }

        // --- 认证逻辑 ---

        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('authTitle').innerText = '学生注册';
            clearAuthMsg();
        }

        function showLogin() {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('authTitle').innerText = '学生登录';
            clearAuthMsg();
        }

        function clearAuthMsg() {
            document.getElementById('authMsg').innerText = '';
        }

        async function handleLogin() {
            const id = document.getElementById('loginId').value.trim();
            const pwd = document.getElementById('loginPwd').value;

            if (!id || !pwd) return showAuthError("请填写完整信息");

            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ student_id: id, password: pwd })
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    // 登录成功
                    loginSuccess(id);
                } else {
                    showAuthError(data.detail || data.message || "登录失败");
                }
            } catch (e) {
                showAuthError("网络错误，请检查后端服务");
            }
        }

        async function handleRegister() {
            const id = document.getElementById('regId').value.trim();
            const pwd1 = document.getElementById('regPwd1').value;
            const pwd2 = document.getElementById('regPwd2').value;

            if (id.length !== 10) return showAuthError("学号必须为 10 位");
            if (pwd1 !== pwd2) return showAuthError("两次输入的密码不一致");
            if (!pwd1) return showAuthError("密码不能为空");

            try {
                const res = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ student_id: id, password: pwd1 })
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    alert("注册成功，请登录");
                    showLogin();
                    // 自动填充账号
                    document.getElementById('loginId').value = id;
                } else {
                    showAuthError(data.detail || data.message || "注册失败");
                }
            } catch (e) {
                showAuthError("网络错误，请检查后端服务");
            }
        }

        function showAuthError(msg) {
            document.getElementById('authMsg').innerText = msg;
        }

        function loginSuccess(studentId) {
            currentUser = studentId;
            localStorage.setItem('cn_agent_user_id', studentId);
            document.getElementById('authOverlay').classList.add('hidden');
            initSystem();
        }

        function logout() {
            if (!confirm("确定要退出登录吗？")) return;

            // 1. 清除本地存储
            localStorage.removeItem('cn_agent_user_id');
            currentUser = null;

            // 2. 重置 UI
            document.getElementById('loginPwd').value = '';
            document.getElementById('authOverlay').classList.remove('hidden');
            showLogin();

            // 3. 停止可能的请求或清空聊天区（可选，因为遮罩层挡住了）
            const container = document.getElementById('chatContainer');
            if (container) container.innerHTML = '';
        }

        // --- 系统核心逻辑 ---

        function initSystem() {
            // 更新用户信息显示
            const userDisp = document.getElementById('currentUserDisplay');
            if (userDisp) userDisp.innerText = currentUser;

            updateSessionDisplay();
            loadHistory();
        }

        // 获取当前的 Session ID (格式: sess_{学号}_{实验ID})
        function getSessionId() {
            if (!currentUser) return null;
            return `sess_${currentUser}_${currentLabKey}`;
        }

        function updateSessionDisplay() {
            const sid = getSessionId();
            if (sid) document.getElementById('sessionId').innerText = sid;
        }

        async function selectExp(event, name) {
            // 1. UI 激活状态切换
            document.querySelectorAll('.exp-list li').forEach(li => li.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('currentExp').innerText = name;

            // 2. 切换 Session ID
            currentLabKey = labMap[name] || 'general';
            updateSessionDisplay();

            // 3. 清空当前视图并加载新历史
            document.getElementById('chatContainer').innerHTML = '';
            // 显示正在加载提示（可选）
            safeAddMessage('bot', `🔄 正在切换到 ${name}...`);

            await loadHistory();
        }

        async function clearCurrentHistory() {
            const sid = getSessionId();
            if (!sid) {
                alert("会话无效，请重新登录");
                return;
            }

            const currentExp = document.getElementById('currentExp').innerText;
            const ok = confirm(`确定要清空【${currentExp}】的聊天历史吗？该操作不可撤销。`);
            if (!ok) return;

            try {
                const response = await fetch(`/chat/history?session_id=${encodeURIComponent(sid)}`, {
                    method: 'DELETE'
                });
                const data = await response.json();

                if (!response.ok || data.status !== 'success') {
                    throw new Error(data.message || `HTTP ${response.status}`);
                }

                const container = document.getElementById('chatContainer');
                if (container) container.innerHTML = '';
                safeAddMessage('bot', `已清空 ${currentExp} 的历史记录。我们可以重新开始。`);
            } catch (e) {
                alert(`清空失败: ${e.message}`);
            }
        }

        async function loadHistory(retryCount = 0) {
            const sid = getSessionId();
            if (!sid) return;

            try {
                const response = await fetch(`/chat/history?session_id=${sid}`);

                if (response.ok) {
                    const data = await response.json();
                    const history = data.history || [];

                    // 清空“正在切换”的提示，重新渲染完整历史
                    const container = document.getElementById('chatContainer');
                    if (container) container.innerHTML = '';

                    if (history.length === 0) {
                        // 如果没有历史，显示默认欢迎语
                        safeAddMessage('bot', `你好！我是你的 ${document.getElementById('currentExp').innerText} 实验助教。有什么问题吗？`);
                    } else {
                        // 渲染历史记录
                        history.forEach(msg => {
                            // role: "user" | "assistant" -> 转换一下
                            const role = msg.role === 'user' ? 'user' : 'bot';
                            safeAddMessage(role, msg.content);
                        });
                    }
                } else {
                    console.error("后端返回错误:", response.status);
                    safeAddMessage('bot', `⚠️ 获取历史记录失败 (Status: ${response.status})。`);
                }
            } catch (e) {
                console.error("加载历史失败详情:", e);
                if (retryCount < 1) {
                    // 也许是网络波动，重试一次
                    setTimeout(() => loadHistory(retryCount + 1), 1000);
                } else {
                    safeAddMessage('bot', `⚠️ 加载历史记录失败: ${e.message}。请检查后端服务。`);
                }
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function safeAddMessage(role, text) {
            const container = document.getElementById('chatContainer');
            if (!container) return;

            const div = document.createElement('div');
            div.className = `message ${role}`;

            let formattedText = text || '';
            try {
                // 确保 marked 可用且 text 是字符串
                if (typeof marked !== 'undefined' && typeof formattedText === 'string') {
                    formattedText = marked.parse(formattedText);
                } else {
                    formattedText = String(formattedText).replace(/\n/g, '<br>');
                }
            } catch (e) {
                console.warn("Markdown parsing failed, fallback to plain text", e);
                formattedText = String(text || '').replace(/\n/g, '<br>');
            }

            div.innerHTML = `
                <div class="avatar">${role === 'bot' ? '🤖' : '👨‍🎓'}</div>
                <div class="bubble">${formattedText}</div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // 向下兼容
        const addMessage = safeAddMessage;

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');
            const text = input.value.trim();

            if (!text) return;

            const sid = getSessionId();
            if (!sid) {
                alert("会话无效，请重新登录");
                location.reload();
                return;
            }

            // UI 更新
            safeAddMessage('user', text);
            input.value = '';
            input.disabled = true;
            btn.disabled = true;
            btn.innerText = '接收中...';

            // 创建机器人回复气泡（用于流式接收）
            const container = document.getElementById('chatContainer');
            const botDiv = document.createElement('div');
            botDiv.className = `message bot`;
            botDiv.innerHTML = `
                <div class="avatar">🤖</div>
                <div class="bubble">
                    <div class="status-msg" id="streamStatus">请求已发送...</div>
                    <div class="content" id="streamContent"></div>
                </div>
            `;
            container.appendChild(botDiv);
            container.scrollTop = container.scrollHeight;

            const statusEl = botDiv.querySelector('#streamStatus');
            const contentEl = botDiv.querySelector('#streamContent');
            let fullMarkdown = "";

            try {
                // 指向后端 8111 端口，改用 /chat/stream
                const response = await fetch('/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sid,
                        query: text
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');

                    // 保留最后一行未完整的 JSON（如果网络拆包的话）
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.trim()) continue;

                        try {
                            const data = JSON.parse(line);
                            if (data.type === 'status') {
                                statusEl.innerText = data.content;
                            } else if (data.type === 'chunk') {
                                // 隐藏状态栏（如果开始输出了）
                                if (fullMarkdown.length === 0) {
                                    statusEl.style.display = 'none';
                                }
                                fullMarkdown += data.content;

                                // 增量渲染 Markdown
                                if (typeof marked !== 'undefined') {
                                    contentEl.innerHTML = marked.parse(fullMarkdown);
                                } else {
                                    contentEl.innerHTML = fullMarkdown.replace(/\n/g, '<br>');
                                }
                                container.scrollTop = container.scrollHeight;
                            } else if (data.type === 'done') {
                                statusEl.style.display = 'none';
                            }
                        } catch (e) {
                            console.error("解析 JSON 失败:", line, e);
                        }
                    }
                }
            } catch (error) {
                statusEl.innerText = "";
                contentEl.innerHTML = `❌ 网络或服务错误: ${error.message}`;
            } finally {
                input.disabled = false;
                btn.disabled = false;
                btn.innerText = '发送';
                input.focus();

                // 确保滚动到底部
                container.scrollTop = container.scrollHeight;
            }
        }
    </script>
</body>

</html>
